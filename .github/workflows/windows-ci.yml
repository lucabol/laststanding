name: Windows CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify clang is available
        run: clang --version

      - name: Create bin directory
        run: if not exist bin mkdir bin
        shell: cmd

      - name: Build
        run: call build.bat
        shell: cmd

      - name: Run tests
        run: |
          @echo off
          setlocal
          set "FAILED=0"
          for %%f in (bin\*.exe) do (
              echo --- Running %%f ---
              "%%f"
              if errorlevel 1 (
                  echo FAIL: %%f
                  set "FAILED=1"
              )
              echo.
          )
          if "%FAILED%"=="1" exit /b 1
        shell: cmd

      - name: Verify binaries
        run: call verify.bat
        shell: cmd
