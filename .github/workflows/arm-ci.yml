name: ARM/AArch64 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  arm-test:
    name: Test ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            cc: arm-linux-gnueabihf-gcc
            packages: gcc-arm-linux-gnueabihf
            qemu_bin: qemu-arm
            qemu_ld_prefix: /usr/arm-linux-gnueabihf
            suffix: .armhf
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
            qemu_bin: qemu-aarch64
            qemu_ld_prefix: /usr/aarch64-linux-gnu
            suffix: .aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.packages }} qemu-user qemu-user-binfmt

      - name: Build
        run: |
          mkdir -p bin
          for f in test/*; do
            x="${f##*/}"
            x="${x%.*}"
            ${{ matrix.cc }} -I. -static -fno-builtin -fno-asynchronous-unwind-tables \
              -Wl,--gc-sections -s -Wall -Wextra -Wpedantic -O3 \
              "$f" -ffreestanding -nostdlib -lgcc -o "bin/${x}${{ matrix.suffix }}"
          done

      - name: Test
        run: |
          echo "=== Running ${{ matrix.arch }} tests via QEMU ==="
          for exe in bin/*${{ matrix.suffix }}; do
            if [ -f "$exe" ] && [ -x "$exe" ]; then
              echo "--- Running $exe ---"
              ${{ matrix.qemu_bin }} -L ${{ matrix.qemu_ld_prefix }} "$exe"
              echo
            fi
          done
