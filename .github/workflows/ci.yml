name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check generated docs are up to date
        run: ./gen-docs.ps1 -Check
        shell: pwsh

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI
        run: ./ci.ps1 -Target windows
        shell: pwsh

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI
        run: ./ci.ps1 -Target linux
        shell: pwsh

  arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu qemu-user

      - name: Run CI
        run: ./ci.ps1 -Target arm
        shell: pwsh
