name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Regenerate README function reference
        run: ./gen-docs.ps1
        shell: pwsh

      - name: Auto-commit updated README
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: auto-regenerate README function reference"
          file_pattern: README.md

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run CI
        run: ./ci.ps1 -Target windows
        shell: pwsh

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run CI
        run: ./ci.ps1 -Target linux
        shell: pwsh

  arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu qemu-user

      - name: Run CI
        run: ./ci.ps1 -Target arm
        shell: pwsh

  riscv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user

      - name: Run CI
        run: ./ci.ps1 -Target riscv
        shell: pwsh

  wasi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install WASI toolchain
        run: sudo apt-get update && sudo apt-get install -y clang lld libclang-rt-dev-wasm32 wasi-libc wabt

      - name: Install Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Run CI
        run: ./ci.ps1 -Target wasi
        shell: pwsh
