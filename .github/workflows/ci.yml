name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Regenerate API docs
        run: ./gen-docs.ps1
        shell: pwsh

      - name: Auto-commit updated docs
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: auto-regenerate API reference"
          file_pattern: "docs/*.md"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run CI
        run: ./ci.ps1 -Target windows
        shell: pwsh

      - name: Upload size data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sizes-windows
          path: bin/ci_sizes.json
          if-no-files-found: ignore

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run CI
        run: ./ci.ps1 -Target linux
        shell: pwsh

      - name: Upload size data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sizes-linux
          path: bin/ci_sizes.json
          if-no-files-found: ignore

  arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu qemu-user

      - name: Run CI
        run: ./ci.ps1 -Target arm
        shell: pwsh

      - name: Upload size data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sizes-arm
          path: bin/ci_sizes.json
          if-no-files-found: ignore

  riscv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user

      - name: Run CI
        run: ./ci.ps1 -Target riscv
        shell: pwsh

      - name: Upload size data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sizes-riscv
          path: bin/ci_sizes.json
          if-no-files-found: ignore

  wasi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install WASI toolchain
        run: sudo apt-get update && sudo apt-get install -y clang lld libclang-rt-dev-wasm32 wasi-libc wabt

      - name: Install Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Run CI
        run: ./ci.ps1 -Target wasi
        shell: pwsh

      - name: Upload size data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sizes-wasi
          path: bin/ci_sizes.json
          if-no-files-found: ignore

  sizes:
    if: always()
    needs: [windows, linux, arm, riscv, wasi]
    runs-on: ubuntu-latest
    steps:
      - name: Download all size artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sizes-*
          merge-multiple: false

      - name: Generate combined size table
        shell: pwsh
        run: |
          $allSizes = @{}
          $shortNames = @{
            'Windows'           = 'Win/clang'
            'Linux (gcc)'       = 'Lin/gcc'
            'Linux (clang)'     = 'Lin/clang'
            'ARM (gcc)'         = 'ARM/gcc'
            'ARM (clang)'       = 'ARM/clang'
            'AArch64 (gcc)'     = 'A64/gcc'
            'AArch64 (clang)'   = 'A64/clang'
            'RISC-V (gcc)'      = 'RV64/gcc'
            'WASI (clang)'      = 'WASI/clang'
          }

          foreach ($f in Get-ChildItem -Recurse -Filter 'ci_sizes.json') {
            $entries = Get-Content $f.FullName -Raw | ConvertFrom-Json
            if ($entries -isnot [System.Array]) { $entries = @($entries) }
            foreach ($entry in $entries) {
              $target = $entry.target
              $sizes = @{}
              foreach ($prop in $entry.PSObject.Properties) {
                if ($prop.Name -ne 'target') { $sizes[$prop.Name] = [int64]$prop.Value }
              }
              if ($sizes.Count -gt 0) { $allSizes[$target] = $sizes }
            }
          }

          if ($allSizes.Count -eq 0) {
            '> No binary size data collected.' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
            return
          }

          $targets = @($allSizes.Keys | Sort-Object @{
            Expression = {
              if ($allSizes[$_].ContainsKey('hello')) { $allSizes[$_]['hello'] }
              else { [int]::MaxValue }
            }
          })

          $showBinaries = @('hello', 'ui_controls')
          $allBinaries = @()
          foreach ($t in $targets) {
            foreach ($name in $allSizes[$t].Keys) {
              if ($name -in $showBinaries -and $name -notin $allBinaries) { $allBinaries += $name }
            }
          }
          $allBinaries = @($allBinaries | Sort-Object)

          $md = @()
          $md += '### 📏 Binary Sizes (all platforms)'
          $md += ''
          $headerCols = @('Configuration') + $allBinaries
          $md += '| ' + ($headerCols -join ' | ') + ' |'
          $md += '| ' + (($headerCols | ForEach-Object { '---' }) -join ' | ') + ' |'

          foreach ($t in $targets) {
            $label = if ($shortNames.ContainsKey($t)) { $shortNames[$t] } else { $t }
            $cols = @($label)
            foreach ($bin in $allBinaries) {
              if ($allSizes[$t].ContainsKey($bin)) {
                $cols += '{0:N0}' -f $allSizes[$t][$bin]
              } else {
                $cols += '-'
              }
            }
            $md += '| ' + ($cols -join ' | ') + ' |'
          }

          $md -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
